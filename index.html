
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05070a;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:500px;min-height:100vh;background:#05070a;display:flex;flex-direction:column;border-left:1px solid #1a1f2c;border-right:1px solid #1a1f2c;box-shadow:0 25px 60px rgba(0,0,0,.8)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:#0c101a;border-bottom:1px solid #262c3f;padding:18px 20px}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:40px;height:40px;background:#004e92;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(0,78,146,.3)}
.brand-name{font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-.5px;line-height:1}
.brand-sub{font-size:9px;font-weight:700;color:#00a8e8;letter-spacing:3px;margin-top:2px}
.mode-badge{padding:4px 12px;border-radius:20px;font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:3px;border:1px solid #262c3f;color:#64748b;transition:all .3s}
.mode-badge.active{border-color:rgba(52,211,153,.4);color:#34d399;background:rgba(52,211,153,.05)}

/* TABS */
.tabs{display:flex;background:#0c101a;padding:6px;gap:6px;border-bottom:1px solid #262c3f}
.tab{flex:1;padding:11px 8px;border-radius:12px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:3px;cursor:pointer;transition:all .2s;border:none;background:none;color:#475569;display:flex;align-items:center;justify-content:center;gap:5px}
.tab:hover{color:#94a3b8}
.tab.active{background:#004e92;color:#fff;box-shadow:0 4px 20px rgba(0,78,146,.4)}
.tab:disabled{opacity:.3;cursor:not-allowed}
.tab svg{width:12px;height:12px;flex-shrink:0}

/* MAIN */
.main{flex:1;padding:20px;overflow-y:auto;padding-bottom:80px}

/* CARDS */
.card{background:#0c101a;border:1px solid #262c3f;border-radius:28px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;overflow:hidden;margin-bottom:16px}
.card::before{content:'';position:absolute;top:-60px;right:-60px;width:140px;height:140px;background:rgba(0,78,146,.05);border-radius:50%;filter:blur(20px)}

/* STEPPER */
.step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.step-label{font-size:9px;font-weight:900;color:#3b82f6;text-transform:uppercase;letter-spacing:4px}
.step-dots{display:flex;gap:5px}
.step-dot{height:3px;width:12px;border-radius:2px;background:#1e293b;transition:all .3s}
.step-dot.done{background:#3b82f6}

.question{font-size:14px;font-weight:900;color:#fff;line-height:1.4;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:#161b29;border:1px solid #262c3f;padding:14px 16px;border-radius:16px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;font-family:'Inter',sans-serif}
.opt-btn:hover{border-color:#3b82f6;color:#fff;transform:translateX(3px)}
.opt-arrow{opacity:0;color:#3b82f6;font-size:14px;transition:opacity .2s}
.opt-btn:hover .opt-arrow{opacity:1}

/* FORM */
.form-title{display:flex;align-items:center;gap:10px;padding-bottom:20px;border-bottom:1px solid #1a1f2c;margin-bottom:20px}
.form-title-text{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:3px;color:#fff}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:9px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:2px}
.form-input{background:#161b29;border:1px solid #262c3f;padding:14px;border-radius:16px;font-size:12px;font-weight:600;color:#fff;outline:none;font-family:'Inter',sans-serif;transition:border-color .2s;width:100%}
.form-input:focus{border-color:#3b82f6}
.form-input::placeholder{color:#334155}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select.form-input option{background:#161b29}

/* BUTTONS */
.btn{width:100%;padding:16px;border-radius:16px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:3px;cursor:pointer;transition:all .2s;border:none;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif}
.btn-primary{background:#004e92;color:#fff;box-shadow:0 8px 30px rgba(0,78,146,.3)}
.btn-primary:hover:not(:disabled){background:#0066c0;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#1a1f2c;color:#94a3b8;border:1px solid #262c3f;margin-top:8px}
.btn-secondary:hover{border-color:#3b82f6;color:#fff}
.btn-dark{background:#0c101a;color:#fff;box-shadow:0 4px 20px rgba(255,255,255,.1)}
.btn-dark:hover{transform:scale(1.02)}
.btn-success{background:#fff;color:#0c101a;box-shadow:0 8px 30px rgba(255,255,255,.2);margin-top:8px}
.btn-success:hover{transform:scale(1.02)}

/* ALERT */
.alert{padding:14px 16px;border-radius:14px;font-size:9px;font-weight:900;letter-spacing:3px;text-align:center;text-transform:uppercase;margin-bottom:20px}
.alert-green{border:1px solid rgba(52,211,153,.4);color:#34d399;background:rgba(52,211,153,.05)}
.alert-amber{border:1px solid rgba(245,166,35,.3);color:#f5a623;background:rgba(245,166,35,.05)}

/* OPTION CARD */
.opt-card{background:#0c101a;border:1px solid #262c3f;border-radius:28px;padding:24px;margin-bottom:16px;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.opt-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.opt-prov{font-size:8px;font-weight:900;color:#3b82f6;text-transform:uppercase;letter-spacing:3px;margin-bottom:4px}
.opt-name{font-size:15px;font-weight:900;color:#fff}
.opt-days{font-size:10px;color:#475569;font-weight:700;margin-top:3px}

.cost-box{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:18px;margin-bottom:12px}
.cost-box-hdr{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:12px}
.cost-box-title{font-size:9px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:2px}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:10px}
.cost-lbl{color:#475569;font-weight:700;text-transform:uppercase}
.cost-val{font-family:'JetBrains Mono',monospace;font-weight:700;color:#94a3b8;display:flex;align-items:center;gap:5px}
.badge-ok{width:12px;height:12px;background:#10b981;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;color:#000;font-weight:900}
.badge-warn{width:12px;height:12px;background:#f59e0b;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;color:#000;font-weight:900}

.cost-subtotal{display:flex;justify-content:space-between;align-items:center;padding:12px 8px;margin:8px -8px;background:rgba(15,23,42,.5);border-radius:8px;border-top:1px solid rgba(255,255,255,.1)}
.cost-subtotal-lbl{font-size:9px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:2px}
.cost-subtotal-val{font-size:13px;font-weight:900;color:#fff;font-family:'JetBrains Mono',monospace}

.margen-row{display:flex;justify-content:space-between;align-items:center;padding:10px;margin-top:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:10px}
.margen-lbl{font-size:10px;font-weight:900;color:#34d399;display:flex;align-items:center;gap:5px}
.margen-val{font-size:11px;font-weight:900;color:#6ee7b7;font-family:'JetBrains Mono',monospace}

/* PRINT QUOTE */
.print-doc{background:#fff;border-radius:32px;padding:32px;color:#0c101a;box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;overflow:hidden}
.print-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px}
.print-company{font-size:9px;font-weight:900;color:#004e92;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.print-title{font-size:22px;font-weight:900;color:#0c101a;line-height:1.1}
.print-id{font-size:9px;font-family:'JetBrains Mono',monospace;color:#94a3b8;margin-top:6px}
.print-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;font-size:11px;font-weight:700}
.print-meta-label{display:block;color:#94a3b8;font-weight:500;margin-bottom:2px;font-size:10px}
.print-product-row{border-top:2px solid #f1f5f9;padding:20px 0;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.print-prod-name{font-size:16px;font-weight:900;color:#0c101a}
.print-prod-prov{font-size:10px;color:#64748b;margin-top:3px}
.print-qty-lbl{font-size:9px;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:2px;display:block;text-align:right;margin-bottom:3px}
.print-qty-val{font-size:16px;font-weight:900;color:#0c101a;text-align:right}
.price-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:24px;text-align:center;margin-bottom:24px}
.price-lbl{font-size:9px;font-weight:900;color:#64748b;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px}
.price-val{font-size:36px;font-weight:900;color:#0c101a}
.price-note{font-size:10px;font-weight:700;color:#004e92;margin-top:8px}
.print-details{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.print-detail-row{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;color:#0c101a}
.print-detail-icon{color:#004e92;font-size:14px}
.print-actions{margin-top:24px;display:flex;flex-direction:column;gap:8px}

/* SUCCESS */
.success-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:20px}
.success-icon{width:96px;height:96px;background:rgba(16,185,129,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;border:4px solid #10b981;box-shadow:0 0 50px rgba(16,185,129,.3);font-size:48px}
.success-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:8px}
.success-sub{font-size:11px;color:#64748b;max-width:280px;line-height:1.6;font-weight:500}
.next-box{background:#1a1f2c;border:1px solid rgba(59,130,246,.3);border-radius:16px;padding:16px;margin-top:8px}
.next-lbl{font-size:10px;font-weight:900;color:#60a5fa;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:5px}
.next-txt{font-size:11px;color:#94a3b8;line-height:1.6}

/* CONSOLE */
.console-section{margin-top:24px}
.console-title{font-size:9px;font-weight:900;color:#334155;text-transform:uppercase;letter-spacing:4px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.console-dot{width:6px;height:6px;background:#3b82f6;border-radius:50%}
.console{background:#0c101a;border:1px solid #262c3f;border-radius:16px;padding:14px;height:128px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.console::-webkit-scrollbar{width:3px}
.console::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.log-line{font-size:10px;font-family:'JetBrains Mono',monospace;line-height:1.5}
.log-dept{font-weight:900;text-transform:uppercase;margin-right:6px}
.dept-ventas{color:#3b82f6}
.dept-compras{color:#f59e0b}
.dept-finanzas{color:#a78bfa}
.dept-sistema{color:#10b981}
.dept-cliente{color:#64748b}
.log-msg{color:#475569}

/* FOOTER */
footer{background:#0c101a;border-top:1px solid #262c3f;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;color:#334155;flex-shrink:0}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{animation:spin .8s linear infinite;display:inline-block}

/* PRINT */
@media print{
  body *{visibility:hidden}
  #printable-quote,#printable-quote *{visibility:visible}
  #printable-quote{position:absolute;left:0;top:0;width:100%;padding:20px;background:white;color:black}
  .no-print{display:none!important}
}

/* ANIM */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .3s ease}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-icon">🏢</div>
      <div>
        <div class="brand-name">IMPORTADORAS</div>
        <div class="brand-sub">GRUPO 5</div>
      </div>
    </div>
    <div class="mode-badge" id="modeBadge">MODO: PROCESO</div>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab active" id="tab-proceso" onclick="setView('proceso')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Proceso
  </button>
  <button class="tab" id="tab-empresa" onclick="setView('empresa')" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Empresa
  </button>
  <button class="tab" id="tab-cliente" onclick="setView('cliente')" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Cliente
  </button>
</nav>

<!-- MAIN -->
<main class="main" id="mainContent">
  <!-- CONTENT INJECTED BY JS -->
</main>

<!-- FOOTER -->
<footer>
  <div>GRUPO5_CORE_v5.5</div>
  <div id="footerTime">—</div>
</footer>

</div>

<script>
// ===================== STATE =====================
let appState = {
  view: 'proceso',
  currentStep: 1,
  qualifier: { score: 0, sectorRate: 0.06, origin: 'china' },
  formData: { client: '', product: '', qty: 10, condition: 'new' },
  analysisResult: null,
  loading: false,
  logs: [
    { dept: 'ventas', msg: 'GRUPO 5: Sistema de Gestión Financiera Conectado.' },
    { dept: 'ventas', msg: 'Esperando input: Recopilación de información del pedido (Paso 1)...' }
  ]
};

const STEPS = [
  { k:'goal', label:'¿Cuál es el motor de tu importación hoy?', opts:[
    {l:'Escalar mi negocio actual',v:25},{l:'Iniciar un nuevo emprendimiento',v:15},{l:'Consumo personal / Proyecto único',v:5}
  ]},
  { k:'docs', label:'¿Tienes ya un proveedor seleccionado?', opts:[
    {l:'Sí, tengo proforma lista',v:25},{l:'Necesito que busquen opciones',v:10},{l:'Solo estoy sondeando costos',v:0}
  ]},
  { k:'budget', label:'¿Cuál es tu rango de inversión proyectado?', opts:[
    {l:'Inversión Corporativa ($10k+)',v:25},{l:'Presupuesto Medio ($2k-$10k)',v:15},{l:'Compra Micro (Menos de $2k)',v:5}
  ]},
  { k:'legal', label:'¿Cómo está registrada tu entidad?', opts:[
    {l:'Empresa Formal (RUC 20)',v:20},{l:'Persona con Negocio (RUC 10)',v:15},{l:'Solo DNI / Particular',v:5}
  ]},
  { k:'time', label:'¿Con qué urgencia requieres la carga?', opts:[
    {l:'Prioridad Máxima (Aéreo)',v:15},{l:'Programado (Marítimo)',v:10},{l:'Sin fecha definida',v:5}
  ]},
  { k:'sector', label:'¿Sector industrial de la mercancía?', opts:[
    {l:'Maquinaria / Capital (0%)',v:0,rate:0},{l:'Manufactura Final (6%)',v:6,rate:0.06},{l:'Textil / Sensibles (11%)',v:11,rate:0.11}
  ]},
  { k:'origin', label:'¿Desde qué continente embarcamos?', opts:[
    {l:'Asia (China/India)',v:'china'},{l:'Norteamérica (USA)',v:'usa'},{l:'Europa (España/Alemania)',v:'spain'}
  ]}
];

// ===================== UTILS =====================
const r2 = n => Math.round(n * 100) / 100;
const usd = n => '$ ' + parseFloat(n).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const genId = () => Math.random().toString(36).substr(2,9).toUpperCase();

function addLog(dept, msg) {
  appState.logs.push({dept, msg});
  const c = document.getElementById('console');
  if (c) {
    const d = document.createElement('div');
    d.className = 'log-line';
    d.innerHTML = `<span class="log-dept dept-${dept}">[${dept}]</span><span class="log-msg">${msg}</span>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
  }
}

function setModeBadge(text, active) {
  const b = document.getElementById('modeBadge');
  b.textContent = 'MODO: ' + text.toUpperCase();
  b.className = 'mode-badge' + (active ? ' active' : '');
}

// ===================== VIEW ROUTER =====================
function setView(v, force=false) {
  if (!force && v !== 'proceso' && !appState.analysisResult) return;
  if (v === 'success') force = true;
  
  appState.view = v;
  
  ['proceso','empresa','cliente'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    if (btn) { btn.classList.toggle('active', t === v); }
  });
  
  setModeBadge(v, !!appState.analysisResult);
  render();
}

// ===================== STEP HANDLER =====================
function handleStep(k, v, label, stepIdx) {
  const s = appState;
  if (k === 'sector') {
    s.qualifier.sectorRate = STEPS[5].opts.find(o=>o.l===label)?.rate ?? 0.06;
    s.qualifier.score += v;
  } else if (k === 'origin') {
    s.qualifier.origin = v;
    s.qualifier.score += 10;
  } else {
    s.qualifier.score += v;
  }
  
  addLog('cliente', 'Pre-calificación: ' + label);
  
  if (s.currentStep < 7) {
    s.currentStep++;
    render();
  } else {
    // Go to form
    s.view = 'form';
    addLog('ventas', 'Perfil verificado. Transfiriendo requerimiento al área de COMPRAS para Sourcing...');
    render();
  }
}

// ===================== PRICING ALGORITHM =====================
function calcCosts(basePrice, origin, rate, score, qty) {
  const val = parseFloat(basePrice) || 0;
  const sRate = parseFloat(rate) || 0.06;

  const fleteReal = 150.00;
  const seguroReal = 12.38;
  const agenteAduana = 380.00;
  const serviciosLocales = 150.00;

  const VCIF = (val * qty) + fleteReal + seguroReal;
  const T1 = VCIF * sRate;
  const T2 = 0;
  const T3 = (VCIF + T1 + T2) * 0.16;
  const T4 = (VCIF + T1 + T2) * 0.02;
  const pRate = score < 65 ? 0.10 : 0.035;
  const T5 = (VCIF + T1 + T2 + T3 + T4) * pRate;

  const totalTaxes = T1 + T2 + T3 + T4 + T5;
  const landingCost = VCIF + totalTaxes + agenteAduana + serviciosLocales;

  const marginPct = landingCost < 5000 ? 0.20 : 0.10;
  const profit = landingCost * marginPct;
  const clientPrice = landingCost + profit;

  return { val, flete:fleteReal, seguro:seguroReal, VCIF:r2(VCIF),
    taxes:{T1:r2(T1),T2,T3:r2(T3),T4:r2(T4),T5:r2(T5),total:r2(totalTaxes)},
    aduana:agenteAduana, servicios:serviciosLocales,
    landingCost:r2(landingCost), marginPct, profit:r2(profit),
    clientPrice:r2(clientPrice), pRate:(pRate*100).toFixed(1) };
}

// ===================== AI API =====================
async function getMarketPrice(product, condition) {
  const prompt = `Actúa como el departamento de COMPRAS de una importadora peruana. Busca el valor FOB unitario realista para: "${product}" en estado "${condition}". 
Responde SOLO con JSON válido sin markdown: {"price": numero_decimal, "description": "breve justificacion"}. 
Usa precios de mercado internacional reales en USD.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    if (data.content && data.content[0]) {
      const txt = data.content[0].text.replace(/```json|```/g, '').trim();
      return JSON.parse(txt);
    }
    throw new Error('No content');
  } catch (e) {
    addLog('sistema', 'API demo mode: usando valor histórico del sector.');
    return { price: 450.00, description: 'Valor de mercado estimado por histórico del sector.' };
  }
}

async function runAnalysis() {
  const fd = appState.formData;
  if (!fd.product) return;

  appState.loading = true;
  renderForm(true);

  addLog('compras', `Buscando proveedores internacionales para ${fd.product}...`);

  const market = await getMarketPrice(fd.product, fd.condition);
  addLog('compras', `Proveedor localizado. Valor FOB: ${usd(market.price)}`);
  addLog('finanzas', 'Calculando costos logísticos y liquidación de impuestos (T1-T5)...');

  const optDefs = [
    { id:'ECON', label:'Asian Link (Sourcing LCL)', factor:0.85, provider:'Ningbo Industrial S.A.', days:45 },
    { id:'STD',  label:'Grupo 5 Core (Verified)',  factor:1.0,  provider:'Global Logistics Partner', days:30 },
    { id:'PREM', label:'Elite Express (Priority)',  factor:1.25, provider:'OEM Direct Factory',      days:15 }
  ];

  const options = optDefs.map(opt => ({
    ...opt,
    ...calcCosts(market.price * opt.factor, appState.qualifier.origin,
                 appState.qualifier.sectorRate, appState.qualifier.score, parseInt(fd.qty))
  }));

  appState.analysisResult = {
    ...market, options,
    isPotential: appState.qualifier.score >= 65,
    client: fd.client || 'Inversionista Externo',
    product: fd.product,
    qty: parseInt(fd.qty),
    selected: null
  };

  appState.loading = false;
  
  document.getElementById('tab-empresa').disabled = false;
  document.getElementById('tab-empresa').classList.remove('hidden');
  
  addLog('finanzas', 'Reporte de rentabilidad y estructuración de precios finalizado.');
  setView('empresa', true);
}

// ===================== RENDER =====================
function render() {
  const v = appState.view;
  const main = document.getElementById('mainContent');

  if (v === 'proceso' && appState.currentStep <= 7) {
    renderStep(main);
  } else if (v === 'form') {
    renderForm(main);
  } else if (v === 'empresa' && appState.analysisResult) {
    renderEmpresa(main);
  } else if (v === 'cliente' && appState.analysisResult?.selected) {
    renderCliente(main);
  } else if (v === 'success') {
    renderSuccess(main);
  } else if (v === 'proceso') {
    renderStep(main);
  }

  renderConsole(main);
}

// ---- STEP ----
function renderStep(main) {
  const step = STEPS[appState.currentStep - 1];
  const dots = Array.from({length:7}, (_,i) =>
    `<div class="step-dot ${i < appState.currentStep ? 'done' : ''}"></div>`
  ).join('');

  main.innerHTML = `
  <div class="card anim">
    <div class="step-header">
      <div class="step-label">Recopilación BPMN</div>
      <div class="step-dots">${dots}</div>
    </div>
    <div class="question">${step.label}</div>
    <div class="options">
      ${step.opts.map(o => `
        <button class="opt-btn" onclick="handleStep('${step.k}',${typeof o.v === 'string' ? "'"+o.v+"'" : o.v},'${o.l.replace(/'/g,"\\'")}',${appState.currentStep})">
          ${o.l}
          <span class="opt-arrow">›</span>
        </button>
      `).join('')}
    </div>
  </div>`;
}

// ---- FORM ----
function renderForm(isLoading) {
  const main = document.getElementById('mainContent');
  if (!main) return;
  const fd = appState.formData;
  main.innerHTML = `
  <div class="card anim">
    <div class="form-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="form-title-text">Sourcing Grupal V5.0</span>
    </div>
    <div class="form-group">
      <label class="form-label">Cliente / Razón Social</label>
      <input class="form-input" id="inp-client" type="text" placeholder="Nombre completo" value="${fd.client}" oninput="appState.formData.client=this.value">
    </div>
    <div class="form-group">
      <label class="form-label">Producto Específico</label>
      <input class="form-input" id="inp-product" type="text" placeholder="Ej: Componentes de red" value="${fd.product}" oninput="appState.formData.product=this.value">
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Cantidad</label>
        <input class="form-input" id="inp-qty" type="number" value="${fd.qty}" oninput="appState.formData.qty=this.value">
      </div>
      <div class="form-group">
        <label class="form-label">Estado Carga</label>
        <select class="form-input" onchange="appState.formData.condition=this.value">
          <option value="new" ${fd.condition==='new'?'selected':''}>Nuevo de Fábrica</option>
          <option value="refurbished" ${fd.condition==='refurbished'?'selected':''}>Refaccionado</option>
          <option value="used" ${fd.condition==='used'?'selected':''}>Usado (Inspección)</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="runAnalysis()" ${appState.loading ? 'disabled' : ''}>
      ${appState.loading
        ? '<span class="spinner">⟳</span> Calculando Rentabilidad...'
        : '⚡ Analizar Proyecto'}
    </button>
  </div>`;
}

// ---- EMPRESA ----
function renderEmpresa(main) {
  const ar = appState.analysisResult;
  
  const optCards = ar.options.map(opt => `
  <div class="opt-card anim">
    <div class="opt-card-hdr">
      <div>
        <div class="opt-prov">Proveedor: ${opt.provider}</div>
        <div class="opt-name">${opt.label}</div>
        <div class="opt-days">Tiempo Est: ${opt.days} días</div>
      </div>
    </div>
    <div class="cost-box">
      <div class="cost-box-hdr">
        <span class="cost-box-title">Costos Base (${ar.qty} u.)</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
      </div>
      <div class="cost-row"><span class="cost-lbl">Valor FOB Total</span><span class="cost-val">${usd(opt.val * ar.qty)}</span></div>
      <div class="cost-row"><span class="cost-lbl">Flete + Seguro</span><span class="cost-val">${usd(opt.flete + opt.seguro)}</span></div>
      <div class="cost-row"><span class="cost-lbl">Impuestos (T1-T5)</span><span class="cost-val">${usd(opt.taxes.total)} <span class="badge-warn">!</span></span></div>
      <div class="cost-row"><span class="cost-lbl">Servicios & Aduana</span><span class="cost-val">${usd(opt.aduana + opt.servicios)}</span></div>
      <div class="cost-subtotal">
        <span class="cost-subtotal-lbl">Costo Real (Desembarque)</span>
        <span class="cost-subtotal-val">${usd(opt.landingCost)}</span>
      </div>
      <div class="margen-row">
        <span class="margen-lbl">⚡ Margen Grupo 5 (${(opt.marginPct*100).toFixed(0)}%)</span>
        <span class="margen-val">+ ${usd(opt.profit)}</span>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="selectOption('${opt.id}')">
      Generar Cotización Final ›
    </button>
  </div>
  `).join('');

  main.innerHTML = `
  <div class="anim">
    <div class="alert ${ar.isPotential ? 'alert-green' : 'alert-amber'}">
      ${ar.isPotential
        ? '✅ Evaluación: Viabilidad Financiera Positiva'
        : '⚠️ Evaluación: Proyecto de Bajo Presupuesto'}
    </div>
    ${optCards}
  </div>`;
}

function selectOption(id) {
  const ar = appState.analysisResult;
  ar.selected = ar.options.find(o => o.id === id);
  document.getElementById('tab-cliente').disabled = false;
  addLog('ventas', `Seleccionada opción ${ar.selected.label}. Preparando Sales Order.`);
  setView('cliente', true);
}

      <div class="print-actions no-print">

// ---- SUCCESS ----
function renderSuccess(main) {
  main.innerHTML = `
  <div class="success-wrap anim">
    <div class="success-icon">✅</div>
    <div>
      <div class="success-title">¡Cotización Aprobada!</div>
      <p class="success-sub">Se ha generado la <strong>Sales Order</strong> y la documentación preliminar de manera exitosa.</p>
      <div class="next-box">
        <div class="next-lbl">↗ Siguiente Paso</div>
        <p class="next-txt">Ahora te pasaremos con el área correspondiente <strong>(Finanzas y Logística)</strong> para ejecutar el pago de la orden y coordinar el despacho.</p>
      </div>
    </div>
    <button class="btn btn-secondary" style="max-width:220px;margin-top:12px" onclick="resetApp()">
      Volver al Inicio
    </button>
  </div>`;
}

// ---- CONSOLE ----
function renderConsole(main) {
  if (appState.view === 'success') return;
  
  // Check if console already exists
  if (!document.getElementById('console-wrap')) {
    const wrap = document.createElement('div');
    wrap.id = 'console-wrap';
    wrap.className = 'console-section';
    wrap.innerHTML = `
      <div class="console-title">
        <div class="console-dot"></div>
        Consola de BPMN (Inter-Áreas)
      </div>
      <div class="console" id="console">
        ${appState.logs.map(l => `
          <div class="log-line">
            <span class="log-dept dept-${l.dept}">[${l.dept}]</span>
            <span class="log-msg">${l.msg}</span>
          </div>
        `).join('')}
      </div>`;
    main.appendChild(wrap);
    const c = document.getElementById('console');
    if (c) c.scrollTop = c.scrollHeight;
  }
}

// ===================== ACTIONS =====================
function confirmOrder() {
  addLog('ventas', 'Cotización aprobada por el cliente. Emitiendo Sales Order.');
  addLog('sistema', 'Derivando expediente al área de FINANZAS y LOGÍSTICA para ejecución.');
  appState.view = 'success';
  
  ['proceso','empresa','cliente'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    if (btn) { btn.classList.toggle('active', false); btn.disabled = true; }
  });
  
  setModeBadge('success', true);
  const main = document.getElementById('mainContent');
  renderSuccess(main);
}

function resetApp() {
  location.reload();
}

// ===================== CLOCK =====================
setInterval(() => {
  const el = document.getElementById('footerTime');
  if (el) el.textContent = new Date().toLocaleTimeString('es-PE',{hour12:false});
}, 1000);

// ===================== INIT =====================
render();
</script>
